name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LLAMA_CPP_REF: b9704

jobs:
  cli:
    name: Build CLI Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make dist VERSION=${GITHUB_REF_NAME}

      - name: Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/*

  llama-cpp-runtime-linux-amd64:
    name: Build llama.cpp RPC Runtime Linux amd64
    runs-on: ubuntu-latest
    needs: cli
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git

      - name: Build runtime
        run: |
          scripts/build-llamacpp-runtime.sh
          CMESH_LLAMA_CPP_STAGE_RUNNER=true scripts/build-llamacpp-runtime.sh

      - name: Verify runtime artifacts
        run: |
          scripts/verify-llamacpp-runtime-artifact.sh dist/runtimes/llama.cpp-${LLAMA_CPP_REF}-linux-amd64-rpc.tar.gz
          scripts/verify-llamacpp-runtime-artifact.sh dist/runtimes/llama.cpp-${LLAMA_CPP_REF}-linux-amd64-rpc-stage.tar.gz

      - name: Checksums
        run: |
          cd dist/runtimes
          sha256sum * > llama-cpp-runtime-checksums.txt

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/runtimes/*

  worker-desktop-macos:
    name: Build Worker Desktop macOS (${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: cli
    permissions:
      contents: write
    env:
      CMESH_MACOS_CERTIFICATE_P12: ${{ secrets.CMESH_MACOS_CERTIFICATE_P12 }}
      CMESH_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.CMESH_MACOS_CERTIFICATE_PASSWORD }}
      CMESH_MACOS_DEVELOPER_IDENTITY: ${{ secrets.CMESH_MACOS_DEVELOPER_IDENTITY }}
      CMESH_MACOS_KEYCHAIN_PASSWORD: ${{ secrets.CMESH_MACOS_KEYCHAIN_PASSWORD }}
      CMESH_MACOS_NOTARY_APPLE_ID: ${{ secrets.CMESH_MACOS_NOTARY_APPLE_ID }}
      CMESH_MACOS_NOTARY_KEY_ID: ${{ secrets.CMESH_MACOS_NOTARY_KEY_ID }}
      CMESH_MACOS_NOTARY_KEY_P8: ${{ secrets.CMESH_MACOS_NOTARY_KEY_P8 }}
      CMESH_MACOS_NOTARY_ISSUER_ID: ${{ secrets.CMESH_MACOS_NOTARY_ISSUER_ID }}
      CMESH_MACOS_NOTARY_PASSWORD: ${{ secrets.CMESH_MACOS_NOTARY_PASSWORD }}
      CMESH_MACOS_NOTARY_TEAM_ID: ${{ secrets.CMESH_MACOS_NOTARY_TEAM_ID }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Import Developer ID certificate
        if: ${{ env.CMESH_MACOS_CERTIFICATE_P12 != '' }}
        run: |
          set -eu
          if [ -z "${CMESH_MACOS_CERTIFICATE_PASSWORD:-}" ]; then
            echo "CMESH_MACOS_CERTIFICATE_PASSWORD is required when CMESH_MACOS_CERTIFICATE_P12 is set" >&2
            exit 1
          fi
          if [ -z "${CMESH_MACOS_KEYCHAIN_PASSWORD:-}" ]; then
            echo "CMESH_MACOS_KEYCHAIN_PASSWORD is required when CMESH_MACOS_CERTIFICATE_P12 is set" >&2
            exit 1
          fi

          certificate_path="$RUNNER_TEMP/cmesh-developer-id.p12"
          keychain_path="$RUNNER_TEMP/cmesh-signing.keychain-db"

          echo "$CMESH_MACOS_CERTIFICATE_P12" | base64 --decode > "$certificate_path"
          security create-keychain -p "$CMESH_MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$CMESH_MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -P "$CMESH_MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$CMESH_MACOS_KEYCHAIN_PASSWORD" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Build
        run: |
          set -eu
          expected_arch="x86_64"
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            expected_arch="arm64"
          fi
          if [ "$(uname -m)" != "$expected_arch" ]; then
            echo "runner arch $(uname -m) does not match expected $expected_arch"
            exit 1
          fi
          mkdir -p dist
          GOOS=darwin GOARCH="${{ matrix.goarch }}" go build -ldflags "-X github.com/cmesh/cmesh/internal/version.Version=${GITHUB_REF_NAME} -X github.com/cmesh/cmesh/internal/version.Commit=${GITHUB_SHA::7} -X github.com/cmesh/cmesh/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o bin/cmesh ./cmd/cmesh
          cd apps/worker_desktop
          flutter pub get
          flutter build macos --dart-define=CMESH_WORKER_VERSION=${GITHUB_REF_NAME}
          app_bundle="build/macos/Build/Products/Release/CMesh Worker.app"
          cp ../../bin/cmesh "$app_bundle/Contents/Resources/cmesh"

          sign_identity="-"
          sign_args=(--force --sign "$sign_identity")
          if [ -n "${CMESH_MACOS_CERTIFICATE_P12:-}" ]; then
            sign_identity="${CMESH_MACOS_DEVELOPER_IDENTITY:-Developer ID Application: Sergey Plagov (V989445HKJ)}"
            sign_args=(--force --options runtime --timestamp --sign "$sign_identity")
          else
            echo "warning: Developer ID secrets are not configured; building an ad-hoc signed DMG that macOS Gatekeeper will block on first launch" >&2
          fi

          codesign "${sign_args[@]}" "$app_bundle/Contents/Resources/cmesh"
          codesign "${sign_args[@]}" --deep "$app_bundle"
          codesign --verify --deep --strict --verbose=2 "$app_bundle"
          dmg_name="CMesh-Worker-Apple-Silicon.dmg"
          ../../scripts/package-macos-dmg.sh "$app_bundle" "../../dist/$dmg_name" "CMesh Worker ${GITHUB_REF_NAME}"

          if [ "$sign_identity" != "-" ]; then
            codesign "${sign_args[@]}" "../../dist/$dmg_name"
            codesign --verify --verbose=2 "../../dist/$dmg_name"

            if [ -n "${CMESH_MACOS_NOTARY_KEY_ID:-}" ] && [ -n "${CMESH_MACOS_NOTARY_KEY_P8:-}" ] && [ -n "${CMESH_MACOS_NOTARY_ISSUER_ID:-}" ]; then
              notary_key_path="$RUNNER_TEMP/AuthKey_${CMESH_MACOS_NOTARY_KEY_ID}.p8"
              echo "$CMESH_MACOS_NOTARY_KEY_P8" | base64 --decode > "$notary_key_path"
              xcrun notarytool submit "../../dist/$dmg_name" \
                --key "$notary_key_path" \
                --key-id "$CMESH_MACOS_NOTARY_KEY_ID" \
                --issuer "$CMESH_MACOS_NOTARY_ISSUER_ID" \
                --wait
            elif [ -n "${CMESH_MACOS_NOTARY_KEY_ID:-}" ] && [ -n "${CMESH_MACOS_NOTARY_KEY_P8:-}" ]; then
              notary_key_path="$RUNNER_TEMP/AuthKey_${CMESH_MACOS_NOTARY_KEY_ID}.p8"
              echo "$CMESH_MACOS_NOTARY_KEY_P8" | base64 --decode > "$notary_key_path"
              xcrun notarytool submit "../../dist/$dmg_name" \
                --key "$notary_key_path" \
                --key-id "$CMESH_MACOS_NOTARY_KEY_ID" \
                --wait
            elif [ -n "${CMESH_MACOS_NOTARY_APPLE_ID:-}" ] && [ -n "${CMESH_MACOS_NOTARY_PASSWORD:-}" ] && [ -n "${CMESH_MACOS_NOTARY_TEAM_ID:-}" ]; then
              xcrun notarytool submit "../../dist/$dmg_name" \
                --apple-id "$CMESH_MACOS_NOTARY_APPLE_ID" \
                --password "$CMESH_MACOS_NOTARY_PASSWORD" \
                --team-id "$CMESH_MACOS_NOTARY_TEAM_ID" \
                --wait
            else
              echo "macOS notarization credentials are missing" >&2
              exit 1
            fi

            xcrun stapler staple "../../dist/$dmg_name"
            spctl -a -vv -t open --context context:primary-signature "../../dist/$dmg_name"
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/CMesh-Worker-*.dmg

  worker-desktop-windows:
    name: Build Worker Desktop Windows
    runs-on: windows-latest
    needs: cli
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin, dist | Out-Null
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          go build -ldflags "-X github.com/cmesh/cmesh/internal/version.Version=$env:GITHUB_REF_NAME -X github.com/cmesh/cmesh/internal/version.Commit=$($env:GITHUB_SHA.Substring(0, 7)) -X github.com/cmesh/cmesh/internal/version.Date=$date" -o bin/cmesh.exe ./cmd/cmesh
          Push-Location apps/worker_desktop
          flutter pub get
          flutter build windows --dart-define=CMESH_WORKER_VERSION=$env:GITHUB_REF_NAME
          Copy-Item ../../bin/cmesh.exe build/windows/x64/runner/Release/cmesh.exe
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ../../dist/CMesh-Worker-windows-amd64.zip -Force
          Pop-Location

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/CMesh-Worker-windows-amd64.zip

  worker-desktop-linux:
    name: Build Worker Desktop Linux
    runs-on: ubuntu-latest
    needs: cli
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libayatana-appindicator3-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Build
        run: |
          set -eu
          mkdir -p bin dist
          go build -ldflags "-X github.com/cmesh/cmesh/internal/version.Version=${GITHUB_REF_NAME} -X github.com/cmesh/cmesh/internal/version.Commit=${GITHUB_SHA::7} -X github.com/cmesh/cmesh/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o bin/cmesh ./cmd/cmesh
          cd apps/worker_desktop
          flutter pub get
          flutter build linux --dart-define=CMESH_WORKER_VERSION=${GITHUB_REF_NAME}
          cp ../../bin/cmesh build/linux/x64/release/bundle/cmesh
          tar -C build/linux/x64/release/bundle -czf ../../dist/CMesh-Worker-linux-amd64.tar.gz .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/CMesh-Worker-linux-amd64.tar.gz
